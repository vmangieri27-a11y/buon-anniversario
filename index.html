<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Regalo di Anniversario</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    height: 100vh;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ffe6f0, #fff);
    overflow: hidden;
    text-align: center;
}

h1 {
    margin-top: 50px;
    color: #d63384;
    padding: 0 20px;
}

#area {
    position: relative;
    width: 100%;
    height: 75vh;
}

button {
    position: absolute;
    padding: 14px 28px;
    font-size: 18px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
}

#si {
    background: #28a745;
    color: white;
    left: 35%;
    top: 40%;
}

#no {
    background: #dc3545;
    color: white;
    left: 55%;
    top: 40%;
}

#gift {
    display: none;
    position: absolute;
    left: 50%;
    top: 60%;
    transform: translate(-50%, -50%);
    width: 280px;
    max-width: 80vw;
    border-radius: 12px;
}

.show {
    display: block !important;
}
</style>
</head>

<body>

<h1>Vuoi scoprire il tuo regalo di anniversario? 🎁</h1>

<div id="area">
    <button id="si">Sì</button>
    <button id="no">No</button>

    <img
        id="gift"
        src="IMG_3842.jpeg"
        alt="Regalo"
    >
</div>

<script>
const si = document.getElementById("si");
const no = document.getElementById("no");
const gift = document.getElementById("gift");
const area = document.getElementById("area");

let fughe = 0;
const maxFughe = 4;

function spostaBottone() {
    const rect = area.getBoundingClientRect();

    const maxX = rect.width - 120;
    const maxY = rect.height - 120;

    const x = Math.random() * maxX;
    const y = Math.random() * maxY;

    si.style.left = x + "px";
    si.style.top = y + "px";

    fughe++;
}

si.addEventListener("click", function(e) {

    if (fughe < maxFughe) {
        e.preventDefault();
        spostaBottone();
        return;
    }

    gift.classList.add("show");
});

no.addEventListener("click", function(e) {
    e.preventDefault();
});
</script>

</body>
</html>

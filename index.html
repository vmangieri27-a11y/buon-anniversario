<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Regalo di Anniversario</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial;
    background:linear-gradient(135deg,#ffe6f0,#fff);
    overflow:hidden;
    text-align:center;
}

h1{
    position:absolute;
    top:6%;
    width:100%;
    font-size:20px;
    color:#d63384;
    padding:0 10px;
}

#area{
    position:relative;
    width:100%;
    height:70vh;
}

button{
    position:absolute;
    padding:14px 26px;
    font-size:18px;
    border:none;
    border-radius:12px;
}

#si{
    background:#28a745;
    color:white;
    left:40%;
    top:45%;
}

#no{
    background:#dc3545;
    color:white;
    left:55%;
    top:45%;
}

.imgFinale{
    display:none;
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    width:180px;
}

#img1{ top:55%; }
#img2{ top:75%; }

.show{
    display:block !important;
    animation:pop .5s ease;
}

@keyframes pop{
    from{transform:translateX(-50%) scale(0);}
    to{transform:translateX(-50%) scale(1);}
}
</style>
</head>

<body>

<h1>Vuoi scoprire il tuo regalo di anniversario? 🎁</h1>

<div id="area">
    <button id="si">Sì</button>
    <button id="no">No</button>

    <!-- LE TUE IMMAGINI -->
    <img id="img1" class="imgFinale" src="IMG_3842.jpeg" alt="regalo">
    <img id="img2" class="imgFinale" src="IMG_3842.jpeg" alt="regalo">
</div>

<script>
const si = document.getElementById("si");
const no = document.getElementById("no");
const img1 = document.getElementById("img1");
const img2 = document.getElementById("img2");

let moves = 0;
const maxMoves = 4;

function moveButton(){
    if(moves >= maxMoves) return;

    const area = document.getElementById("area").getBoundingClientRect();

    const x = Math.random() * (area.width - 120);
    const y = Math.random() * (area.height - 120);

    si.style.left = x + "px";
    si.style.top = y + "px";

    moves++;
}

si.addEventListener("mouseover", moveButton);
si.addEventListener("touchstart", moveButton);

no.addEventListener("click", e=>{
    e.preventDefault();
});

si.addEventListener("click", ()=>{
    img1.classList.add("show");
    img2.classList.add("show");
});
</script>

</body>
</html>

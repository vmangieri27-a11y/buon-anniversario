<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Regalo di Anniversario</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    height:100vh;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#ffd6e7,#fff5f8);
    overflow:hidden;
    text-align:center;
}

h1{
    margin-top:50px;
    padding:0 20px;
    color:#d63384;
    font-size:28px;
    line-height:1.3;
}

#area{
    position:relative;
    width:100%;
    height:75vh;
}

button{
    position:absolute;
    padding:16px 32px;
    font-size:20px;
    border:none;
    border-radius:999px;
    cursor:pointer;
    box-shadow:0 6px 15px rgba(0,0,0,0.15);
    transition:transform .2s;
}

button:active{
    transform:scale(0.95);
}

#si{
    background:#28a745;
    color:white;
    left:35%;
    top:40%;
}

#no{
    background:#ff4d6d;
    color:white;
    left:55%;
    top:40%;
}

#gift{
    display:none;
    position:absolute;
    left:50%;
    top:58%;
    transform:translate(-50%,-50%);
    width:320px;
    max-width:85vw;
    border-radius:20px;
    box-shadow:0 12px 30px rgba(0,0,0,0.25);
}

.show{
    display:block !important;
    animation:regalo .8s ease;
}

@keyframes regalo{

    0%{
        opacity:0;
        transform:translate(-50%,-50%) scale(0.2) rotate(-10deg);
    }

    70%{
        transform:translate(-50%,-50%) scale(1.08) rotate(3deg);
    }

    100%{
        opacity:1;
        transform:translate(-50%,-50%) scale(1);
    }
}

#messaggio{
    display:none;
    position:absolute;
    top:84%;
    width:100%;
    color:#d63384;
    font-size:24px;
    font-weight:bold;
}

#messaggio.show{
    display:block;
}
</style>
</head>

<body>

<h1>💖 Vuoi scoprire il tuo regalo di anniversario? 💖</h1>

<div id="area">

    <button id="si">Sì</button>
    <button id="no">No</button>

    <img id="gift"
         src="IMG_3842.jpeg"
         alt="Regalo">

    <div id="messaggio">
        🎾 Sorpresa! 🎾
    </div>

</div>

<script>

const si = document.getElementById("si");
const no = document.getElementById("no");
const gift = document.getElementById("gift");
const messaggio = document.getElementById("messaggio");
const area = document.getElementById("area");

let fughe = 0;
const maxFughe = 4;

function spostaBottone(){

    const rect = area.getBoundingClientRect();

    const maxX = rect.width - 140;
    const maxY = rect.height - 140;

    const x = Math.random() * maxX;
    const y = Math.random() * maxY;

    si.style.left = x + "px";
    si.style.top = y + "px";

    fughe++;
}

si.addEventListener("click", function(e){

    if(fughe < maxFughe){
        e.preventDefault();
        spostaBottone();
        return;
    }

    gift.classList.add("show");
    messaggio.classList.add("show");
});

no.addEventListener("click", function(e){
    e.preventDefault();
});

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Regalo di Anniversario</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#ffe6f0,#fff);
    overflow:hidden;
    text-align:center;
}

h1{
    font-size:20px;
    color:#d63384;
    padding:0 15px;
    position:absolute;
    top:6%;
}

#area{
    position:relative;
    width:100%;
    height:70vh;
}

button{
    position:absolute;
    padding:14px 26px;
    font-size:18px;
    border:none;
    border-radius:12px;
    touch-action: manipulation;
}

#si{
    background:#28a745;
    color:white;
    left:40%;
    top:45%;
}

#no{
    background:#dc3545;
    color:white;
    left:55%;
    top:45%;
}

#gift, #gift2{
    display:none;
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    max-width:160px;
}

#gift{ top:55%; }
#gift2{ top:72%; }

.show{
    display:block !important;
    animation:pop .5s ease;
}

@keyframes pop{
    from{transform:translateX(-50%) scale(0);}
    to{transform:translateX(-50%) scale(1);}
}
</style>
</head>

<body>

<h1>Vuoi scoprire il tuo regalo di anniversario? 🎁</h1>

<div id="area">
    <button id="si">Sì</button>
    <button id="no">No</button>

    <img id="gift" src="https://upload.wikimedia.org/wikipedia/commons/9/9e/Tennis_racket_and_balls.jpg" alt="racchetta 1">
    <img id="gift2" src="https://upload.wikimedia.org/wikipedia/commons/9/9e/Tennis_racket_and_balls.jpg" alt="racchetta 2">
</div>

<script>
const si = document.getElementById("si");
const no = document.getElementById("no");
const gift = document.getElementById("gift");
const gift2 = document.getElementById("gift2");

let moves = 0;
const maxMoves = 4;

function moveButton(){
    if(moves >= maxMoves) return;

    const area = document.getElementById("area").getBoundingClientRect();

    const x = Math.random() * (area.width - 120);
    const y = Math.random() * (area.height - 120);

    si.style.left = x + "px";
    si.style.top = y + "px";

    moves++;
}

si.addEventListener("mouseover", moveButton);
si.addEventListener("touchstart", moveButton);

no.addEventListener("click", e=>{
    e.preventDefault();
});

si.addEventListener("click", ()=>{
    gift.classList.add("show");
    gift2.classList.add("show");
});
</script>

</body>
</html>
